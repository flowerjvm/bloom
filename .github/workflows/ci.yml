name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - pom.xml
      - bloom-core/**
      - bloom-spring/**
      - bloom-flower-adapter/**
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - pom.xml
      - bloom-core/**
      - bloom-spring/**
      - bloom-flower-adapter/**
      - .github/workflows/ci.yml

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify
        run: mvn -B -ntp clean verify
